services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diy_bag}
      POSTGRES_USER: ${POSTGRES_USER:-diy_bag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diy_bag} -d ${POSTGRES_DB:-diy_bag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./services/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://diy_bag:change_me@db:5432/diy_bag}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./services/api:/app
    depends_on:
      db:
        condition: service_healthy

  admin-web:
    build: ./apps/admin-web
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    volumes:
      - ./apps/admin-web:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      - api

  miniapp:
    build: ./apps/miniapp
    ports:
      - "${MINIAPP_PORT:-5174}:5174"
    volumes:
      - ./apps/miniapp:/app
      - miniapp_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  admin_node_modules:
  miniapp_node_modules:
